<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found - Magic Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0e0f18;
      --text-primary: #eae7df;
      --text-body: #9f9bae;
      --text-dim: #5c5872;
      --accent-blue: #96cffe;
      --accent-green: #8eecc0;
    }

    html {
      background: var(--bg);
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: var(--text-body);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.0625rem;
      margin-bottom: 2rem;
      color: var(--text-dim);
    }

    a {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--accent-blue);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: var(--accent-green);
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn't exist.</p>
    <a href="/">Back to Magic Factory</a>
  </div>
</body>
</html>
